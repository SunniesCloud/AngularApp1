<div class="user-card" [class.online-border]="isOnline">
  <div class="profile-header">
    <div class="avatar-container">
      <img [src]="user.profilePicture" alt="{{user.name}}'s profile picture" class="avatar">
      <span class="status-indicator" [class]="getStatusClass()">
        <span class="status-tooltip">{{isOnline ? 'Online' : 'Offline'}}</span>
      </span>
    </div>
    <h2 class="user-name">{{user.name}}</h2>
    <p class="user-title">{{user.occupation}}</p>
  </div>
  
  <div class="user-details">
    <div class="detail-item">
      <span class="icon">📅</span>
      <span>Age: {{user.age}}</span>
    </div>
    <div class="detail-item">
      <span class="icon">📍</span>
      <span>{{user.location}}</span>
    </div>
    <div class="detail-item">
      <span class="icon">📧</span>
      <span>{{user.email}}</span>
    </div>
    <div class="detail-item">
      <span class="icon">🎂</span>
      <span>Joined: {{user.joinDate | date:'mediumDate'}}</span>
    </div>
  </div>
</div>



<img [src]="ametrine.jpeg" width="150">
<h2>{{user.name}}</h2>
<p>{{user.bio}}</p>
